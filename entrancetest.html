 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harccian Entrance Exam</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-info {
            max-width: 900px;
            width: 90%;
            background: #1c1c1c;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px 10px 0 0;
            border-bottom: 4px solid red;
            text-align: center;
        }

        .form-container {
            width: 100%;
            max-width: 900px;
            background: #fff; /* Google Forms usually look best on white or their native bg */
            border-radius: 0 0 10px 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        iframe {
            width: 100%;
            height: 1200px; /* Adjust height as needed for your form length */
            border: none;
        }

        .warning-text {
            color: #ff4444;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="header-info">
        <h2>Harccian Entrance Exam</h2>
        <p class="warning-text">⚠ Please ensure you have a stable connection before starting.</p>
        <p>Complete the form below to submit your application.</p>
    </div>

    <div class="form-container">
        <iframe 
            src="https://docs.google.com/forms/d/e/1FAIpQLSfLYyVXpvsPBrp4ij8WXzU8YeX8JN4IhbGUBYhiEvCk7fUZNQ/viewform?embedded=true" 
            frameborder="0" 
            marginheight="0" 
            marginwidth="0">
            Loading…
        </iframe>
    </div>

</body>
</html>
