 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harccian Entrance Exam</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: #eee;
    padding: 20px;
    user-select: none;
}

.container {
    max-width: 900px;
    margin: auto;
    background: #1c1c1c;
    padding: 20px;
    border-radius: 10px;
}

.warning {
    background: darkred;
    padding: 12px;
    text-align: center;
    margin-bottom: 15px;
    font-weight: bold;
}

.progress-bar {
    width: 100%;
    background: #333;
    border-radius: 20px;
    margin-bottom: 15px;
}

.progress {
    height: 18px;
    width: 0%;
    background: red;
    border-radius: 20px;
}

.question {
    margin-bottom: 15px;
}

button {
    padding: 12px;
    width: 48%;
    margin-top: 10px;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
}

.nav {
    display: flex;
    justify-content: space-between;
}
</style>

<script>
// Anti-cheat
document.addEventListener("contextmenu", e => e.preventDefault());
document.onkeydown = function(e){
    if(e.keyCode==123 || (e.ctrlKey && e.shiftKey && e.keyCode==73)){
        window.location.href="index.html";
        return false;
    }
};
</script>

</head>

<body>

<div class="container">

<div class="warning">
⚠️ SECURITY WARNING: Any tampering will terminate the exam
</div>

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

<h2>HARCCIAN ENTRANCE EXAM</h2>

<div id="page"></div>

<div class="nav">
<button onclick="prevPage()">Back</button>
<button onclick="nextPage()">Next</button>
</div>

<button style="width:100%; margin-top:10px;" onclick="submitExam()">Submit Exam</button>

</div>

<script>

// ---------------------- QUESTIONS ----------------------
const questions = [
"He doesn’t like apples","Receive spelling","She is going","Cowboy noun","Its raining",
"They are playing","Past tense run","She has book","Verb barked","There are people",
"Definitely spelling","I saw him","Adjective big","Dont go","Has finished",
"Plural child","We were late","Pronoun him","I am going","Separate spelling",
"They have arrived","Adverb quickly","Who’s there","She is happy","I did nothing",

"God created world","Noah ark","6 days creation","Adam","Eve",
"Moses Israel","Red Sea","David Goliath","Jonah fish","Bethlehem",
"Mary","John Baptist","12 disciples","Judas","3 days tomb",
"Genesis","Revelation","Psalms","Daniel lions","Joseph dreams",
"Water wine","Peter water","Love God","Bible Word","Jesus Son",

"HBC","Motto","Accredited?","Harccian","Focus",
"Course type","Study","Platform","Govern","Affiliated",
"Certificates","Why study","Started","Barrier","Environment",
"Who for","AI review","AI role","Data","Share",
"Storage","Rules","Volunteers","Alumni","Meaning"
];

// ---------------------- ANSWERS ----------------------
const answers = [
"B","B","B","B","B",
"B","B","B","B","B",
"B","B","B","B","A",
"B","B","B","A","A",
"B","B","B","A","A",

"B","A","B","A","B",
"B","B","B","A","C",
"A","B","B","B","B",
"B","B","B","A","B",
"B","B","B","A","B",

"B","B","B","B","B",
"B","B","C","C","C",
"B","B","B","B","B",
"B","B","B","B","C",
"C","B","B","B","C"
];

// ---------------------- STATE ----------------------
let page = 0;
const perPage = 25;
let storedAnswers = new Array(75).fill(null);

// ---------------------- RENDER ----------------------
function render(){
    let start = page * perPage;
    let end = start + perPage;

    let html = "";

    for(let i=start;i<end;i++){
        html += `
        <div class="question">
            <p><strong>Question ${i+1}:</strong> ${questions[i]}</p>
            <label><input type="radio" name="q${i}" value="A" onchange="save(${i},'A')"> A</label>
            <label><input type="radio" name="q${i}" value="B" onchange="save(${i},'B')"> B</label>
            <label><input type="radio" name="q${i}" value="C" onchange="save(${i},'C')"> C</label>
        </div>
        `;
    }

    document.getElementById("page").innerHTML = html;

    updateProgress();
}

// ---------------------- SAVE ANSWERS ----------------------
function save(i,val){
    storedAnswers[i] = val;
    updateProgress();
}

// ---------------------- PROGRESS ----------------------
function updateProgress(){
    let answered = storedAnswers.filter(x=>x!==null).length;
    document.getElementById("progress").style.width = (answered/75*100)+"%";
}

// ---------------------- NAV ----------------------
function nextPage(){
    if(page < 2){
        page++;
        render();
    }
}

function prevPage(){
    if(page > 0){
        page--;
        render();
    }
}

// ---------------------- SUBMIT ----------------------
function submitExam(){
    for(let i=0;i<75;i++){
        if(!storedAnswers[i]){
            alert("You must answer ALL questions.");
            return;
        }
    }

    let score = 0;

    for(let i=0;i<75;i++){
        if(storedAnswers[i] === answers[i]){
            score++;
        }
    }

    if(score >= 68){
        alert("PASS: 90% achieved. Redirecting...");
        window.location.href="apply1.html";
    } else {
        alert("FAIL: You may retry the exam.");
    }
}

// init
render();
</script>

</body>
</html>
