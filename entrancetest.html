 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Harccian Entrance Exam</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: #eee;
    padding: 20px;
    user-select: none;
}

.container {
    background: #1c1c1c;
    padding: 25px;
    max-width: 900px;
    margin: auto;
    border-radius: 10px;
}

h1, h2 {
    text-align: center;
}

/* WARNING BOX */
.warning {
    background: #8b0000;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    margin-bottom: 20px;
    border: 2px solid red;
}

/* Progress Bar */
.progress-bar {
    width: 100%;
    background: #333;
    border-radius: 20px;
    margin-bottom: 20px;
}

.progress {
    height: 20px;
    width: 0%;
    background: red;
    border-radius: 20px;
}

.question {
    margin-bottom: 20px;
}

label {
    display: block;
    margin: 5px 0;
}

button {
    padding: 15px;
    width: 100%;
    background: red;
    color: white;
    border: none;
    font-size: 16px;
    cursor: pointer;
}
</style>

<script>
// 🚫 Anti-Cheat Protections

// Disable right click
document.addEventListener("contextmenu", e => e.preventDefault());

// Disable keys (inspect, copy, etc)
document.onkeydown = function(e) {
    if (
        e.keyCode == 123 || // F12
        (e.ctrlKey && e.shiftKey && e.keyCode == 73) || // Ctrl+Shift+I
        (e.ctrlKey && e.keyCode == 85) || // Ctrl+U
        (e.ctrlKey && e.keyCode == 67) || // Ctrl+C
        (e.ctrlKey && e.keyCode == 65) // Ctrl+A
    ) {
        alert("⚠️ SECURITY WARNING: Tampering detected. Exam will be terminated.");
        window.location.href = "index.html";
        return false;
    }
};
</script>

</head>

<body>

<div class="container">

<h1>HARCCIAN ENTRANCE EXAM</h1>

<div class="warning">
⚠️ SECURITY WARNING ⚠️ <br>
Any attempt to inspect, copy, or tamper with this exam will result in immediate termination.
</div>

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

<p><strong>This exam must be completed in ONE sitting. Progress will NOT be saved.</strong></p>

<form id="examForm">

<!-- QUESTIONS -->
<div id="questions"></div>

<button type="button" onclick="submitExam()">Submit Exam</button>

</form>

</div>

<script>

// ANSWERS
const answers = [
"B","B","B","B","B","B","B","B","B","B",
"B","B","B","B","A","B","B","B","A","A",
"B","B","B","A","A",
"B","A","B","A","B","B","B","B","A","C",
"A","B","B","B","B","B","B","B","A","B",
"B","B","B","A","B","B",
"B","B","B","B","B","B","B","B","C","C",
"C","B","B","B","B","B","B","B","B","C"
];

// FULL QUESTIONS TEXT
const questions = [
"He doesn’t like apples",
"Correct spelling of Receive",
"She is going to school",
"Noun in sentence (cowboy)",
"Correct punctuation It's",
"They are playing",
"Past tense ran",
"She has a book",
"Verb barked",
"There are many people",
"Correct spelling Definitely",
"I saw him yesterday",
"Adjective big",
"Don't go there",
"He has finished",
"Plural children",
"We were late",
"Pronoun him",
"I am going",
"Correct spelling Separate",
"They have arrived",
"Adverb quickly",
"Who's there",
"She is happy",
"I did nothing",

"God created world",
"Noah built ark",
"6 days creation",
"Adam first man",
"Eve first woman",
"Moses led Israel",
"Red Sea Moses",
"David defeated Goliath",
"Jonah swallowed",
"Bethlehem birth",
"Mary mother",
"John baptized",
"12 disciples",
"Judas betrayed",
"3 days tomb",
"Genesis first book",
"Revelation last book",
"David Psalms",
"Daniel lions den",
"Joseph dreams",
"Water to wine",
"Peter walked water",
"Love God",
"Bible is Word of God",
"Jesus Son of God",

"HBC Harccian Bible College",
"Motto Fides et Excellentia",
"Not accredited",
"Independent online platform",
"Biblical training focus",
"Non-accredited courses",
"Rigorous study",
"Fully online",
"Self governed",
"No affiliation",
"Internal recognition",
"Spiritual growth",
"Started in India",
"Removes financial barriers",
"Disciplined environment",
"Serious students",
"Founder reviews AI",
"AI support only",
"Minimal data collection",
"Never shares data",
"Google storage",
"All must follow privacy",
"Volunteer unpaid",
"Alumni after 1 year",
"Internal achievement"
];

// Render questions
const container = document.getElementById("questions");

for (let i = 0; i < questions.length; i++) {
    let div = document.createElement("div");
    div.classList.add("question");

    div.innerHTML = `
        <p><strong>Question ${i+1}:</strong> ${questions[i]}</p>
        <label><input type="radio" name="q${i}" value="A"> A</label>
        <label><input type="radio" name="q${i}" value="B"> B</label>
        <label><input type="radio" name="q${i}" value="C"> C</label>
    `;

    container.appendChild(div);
}

// Progress tracking
document.addEventListener("change", () => {
    let answered = 0;

    for (let i = 0; i < 75; i++) {
        if (document.querySelector(`input[name="q${i}"]:checked`)) {
            answered++;
        }
    }

    let percent = (answered / 75) * 100;
    document.getElementById("progress").style.width = percent + "%";
});

// Submit
function submitExam() {
    let score = 0;

    for (let i = 0; i < 75; i++) {
        let selected = document.querySelector(`input[name="q${i}"]:checked`);

        if (!selected) {
            alert("You must answer ALL questions.");
            return;
        }

        if (selected.value === answers[i]) {
            score++;
        }
    }

    if (score >= 68) {
        alert("PASS — You may proceed.");
        window.location.href = "apply1.html";
    } else {
        alert("FAIL — You need 90%.");
    }
}

</script>

</body>
</html>
