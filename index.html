 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Great+Vibes&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: #192535;
      color: white;
      font-family: 'Lato', Arial, sans-serif;
      text-align: center;
      min-height: 100vh;
    }

    .banner-container, .mainbanner-container {
      width: 100%;
      margin: 15px 0;
    }
    .banner-container img, .mainbanner-container img {
      width: 60%;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 8px;
    }

    .nav-container {
      margin: 15px 0;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .dropdown { position: relative; display: inline-block; }
    
    .menu-button {
      display: inline-block;
      background-color: #be2834;
      color: white;
      padding: 12px 20px;
      margin: 5px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 5px;
      font-size: 13px;
      transition: 0.3s;
      cursor: pointer;
      border: none;
      font-family: 'Cinzel', serif;
      letter-spacing: 1px;
    }
    .menu-button:hover { 
      background-color: #ffffff; 
      color: #be2834; 
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #192535;
      min-width: 220px;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.6);
      z-index: 10;
      border: 1px solid #d4af37;
      border-radius: 4px;
      text-align: left;
    }
    .dropdown-content a {
      color: white;
      padding: 12px 18px;
      text-decoration: none;
      display: block;
      font-size: 14px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    }
    .dropdown-content a:hover { 
      background-color: #be2834; 
      color: white; 
    }
    .dropdown:hover .dropdown-content { display: block; }

    .menu-divider {
      border: 0;
      height: 1px;
      background: #d4af37;
      width: 80%;
      margin: 15px auto;
    }

    .notice-box {
      background-color: #be2834;
      color: #ffffff;
      font-size: 14px;
      font-weight: bold;
      padding: 25px 40px;
      margin: 30px auto;
      max-width: 700px;
      border-radius: 8px;
      line-height: 1.7;
      border-left: 8px solid #ffd700;
      border-right: 8px solid #ffd700;
    }

    .apply-box {
      max-width: 850px;
      width: 92%;
      margin: 0 auto 60px auto;
      background: linear-gradient(135deg, #be2834, #192535);
      border: 3px solid #d4af37;
      border-radius: 8px;
      padding: 50px 40px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    .apply-btn {
      display: inline-block;
      background: #ffd700;
      color: #192535;
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 900;
      padding: 18px 50px;
      border-radius: 5px;
      text-decoration: none;
      letter-spacing: 2px;
      transition: 0.3s;
    }
  </style>
</head>
