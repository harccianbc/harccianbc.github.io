 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apply to Harccian</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root { 
  --n: #192535;
  --r: #be2834;
  --g: #d4af37;
  --c: #fdfcf7;
}

/* BODY */
body {
  margin: 0;
  font-family: 'Lato', sans-serif;
  background: #05070a;
  color: white;
}

/* NAV */
.nav-container {
  background: rgba(25, 37, 53, 0.95);
  padding: 15px;
  text-align: center;
}

.nav-container a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
  font-family: 'Cinzel', serif;
}

.nav-container a:hover {
  color: var(--g);
}

/* HERO */
.hero {
  background: radial-gradient(circle at center, #1c2a3b, #192535);
  padding: 60px 20px;
  text-align: center;
  border-bottom: 4px solid var(--g);
}

.hero h1 {
  font-family: 'Cinzel', serif;
  font-size: 55px;
  color: var(--g);
  margin: 0;
  text-transform: uppercase;
  letter-spacing: 5px;
}

.hero p {
  margin-top: 15px;
  font-family: 'Cinzel', serif;
  color: #fff;
  letter-spacing: 2px;
}

/* FORM */
.container {
  max-width: 850px;
  margin: 40px auto;
  background: var(--c);
  color: var(--n);
  padding: 40px;
  border-top: 10px solid var(--r);
  border-bottom: 5px solid var(--g);
  border-radius: 6px;
}

h2 {
  text-align: center;
  font-family: 'Cinzel', serif;
  color: var(--r);
  margin-bottom: 10px;
}

.sub {
  text-align: center;
  font-size: 14px;
  margin-bottom: 25px;
}

/* BOX */
.notice {
  background: #eaedf0;
  padding: 20px;
  border-left: 5px solid var(--r);
  margin-bottom: 25px;
  color: #222;
  line-height: 1.6;
}

/* CHECKBOX */
label {
  display: block;
  margin: 15px 0;
  font-weight: bold;
  color: var(--n);
  text-transform: uppercase;
}

input[type="checkbox"] {
  transform: scale(1.3);
  margin-right: 10px;
  accent-color: var(--r);
}

/* BUTTONS */
button {
  width: 100%;
  padding: 18px;
  margin-top: 15px;
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: 16px;
  cursor: pointer;
  border: none;
}

.agree {
  background: #27ae60;
  color: white;
}

.agree:hover {
  background: #2ecc71;
}

.exit {
  background: var(--r);
  color: white;
}

.exit:hover {
  background: #e74c3c;
}
</style>
</head>

<body>

<!-- NAV (FIXED LINKS) -->
<div class="nav-container">
  <a href="index.html">HOME</a>
  <a href="mission.html">MISSION</a>
  <a href="apply.html">APPLY</a>
  <a href="calendar.html">CALENDAR</a>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Apply to Harccian</h1>
  <p>Nothing is given for free</p>
</div>

<!-- FORM -->
<div class="container">

<h2>Harccian Enrollment</h2>
<p class="sub">Office of Academic Admissions</p>

<div class="notice">
<strong>STUDENT AGREEMENT</strong><br><br>
Harccian is a non-accredited online training platform focused on biblical and ministry education.
You must agree to the terms before continuing.
</div>

<label><input type="checkbox" class="chk"> I am 18 years or older</label>
<label><input type="checkbox" class="chk"> I accept non-accredited status</label>
<label><input type="checkbox" class="chk"> I will uphold integrity</label>
<label><input type="checkbox" class="chk"> I accept no appeal policy</label>

<button class="agree" onclick="submitForm()">I AGREE & CONTINUE</button>
<button class="exit" onclick="window.location.href='index.html'">EXIT</button>

</div>

<script>
function submitForm() {
  const boxes = document.querySelectorAll('.chk');
  const allChecked = [...boxes].every(c => c.checked);

  if(allChecked) {
    window.location.href = "assessment.html";
  } else {
    alert("You must accept all terms before continuing.");
  }
}
</script>

</body>
</html>
