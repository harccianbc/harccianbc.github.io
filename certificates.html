 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CERTIFICATES - HARCCIAN Bible College</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Great+Vibes&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #192535;
  color: white;
  font-family: 'Lato', Arial, sans-serif;
  text-align: center;
  min-height: 100vh;
}

/* HEADER (same as your index) */
.banner-container {
  width: 100%;
  margin: 15px 0;
}

.banner-container img {
  width: 60%;
  display: block;
  margin: 0 auto;
  border-radius: 8px;
}

.menu-divider {
  border: 0;
  height: 1px;
  background: #d4af37;
  width: 80%;
  margin: 15px auto;
}

/* SIMPLE CONTENT BOX */
.page-box {
  max-width: 900px;
  margin: 40px auto;
  background: #fdfcf7;
  color: #192535;
  padding: 50px;
  border-radius: 6px;
  border: 2px solid #d4af37;
  text-align: left;
}

.page-box h1 {
  font-family: 'Cinzel', serif;
  color: #be2834;
  text-align: center;
  margin-bottom: 20px;
}

/* FOOTER (simple match) */
.footer {
  margin-top: 40px;
  padding: 20px;
  background: linear-gradient(135deg, #be2834, #192535);
  text-align: center;
}

.footer img {
  width: 120px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="banner-container">
  <img src="HARCCIAN (4).png" alt="banner">
</div>

<hr class="menu-divider">

<!-- PAGE CONTENT -->
<div class="page-box">
  <h1>CERTIFICATES</h1>

  <p>
    Welcome to the certificate page.
    <br><br>
    This is where students will access their completion certificates.
    <br><br>
    ✔ Certificate display  
    <br>
    ✔ Certificate verification  
    <br>
    ✔ Student records (future update)
  </p>
</div>

<!-- FOOTER -->
<div class="footer">
  <img src="h4logo.png" alt="logo">
  <p>© 2026 HARCCIAN BIBLE COLLEGE™</p>
</div>

</body>
</html>
