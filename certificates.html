 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificates - HARCCIAN Bible College</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Great+Vibes&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #192535;
      color: white;
      font-family: 'Lato', Arial, sans-serif;
      text-align: center;
      min-height: 100vh;
    }

    .banner-container, .mainbanner-container {
      width: 100%;
      margin: 15px 0;
    }

    .banner-container img, .mainbanner-container img {
      width: 60%;
      display: block;
      margin: 0 auto;
      border-radius: 8px;
    }

    /* NAV (same as index) */
    .nav-container {
      margin: 15px 0;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .dropdown { position: relative; display: inline-block; }

    .menu-button {
      background-color: #be2834;
      color: white;
      padding: 12px 20px;
      margin: 5px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 5px;
      font-size: 13px;
      cursor: pointer;
      border: none;
      font-family: 'Cinzel', serif;
    }

    .menu-button:hover {
      background: white;
      color: #be2834;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #192535;
      min-width: 220px;
      border: 1px solid #d4af37;
      z-index: 10;
      text-align: left;
    }

    .dropdown-content a {
      color: white;
      padding: 12px;
      display: block;
      text-decoration: none;
      font-size: 14px;
    }

    .dropdown:hover .dropdown-content { display: block; }

    .menu-divider {
      height: 1px;
      background: #d4af37;
      width: 80%;
      margin: 15px auto;
    }

    /* CERTIFICATE PAGE */
    .cert-box {
      max-width: 800px;
      margin: 40px auto;
      background: #fdfcf7;
      color: #192535;
      padding: 40px;
      border-radius: 8px;
      border: 2px solid #d4af37;
      text-align: center;
    }

    .cert-box h1 {
      font-family: 'Cinzel', serif;
      color: #be2834;
      margin-bottom: 15px;
    }

    .quiz {
      margin-top: 20px;
      text-align: left;
    }

    .quiz p {
      margin: 10px 0;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
    }

    button {
      padding: 12px 20px;
      background: #ffd700;
      border: none;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Cinzel';
    }

    #formBox {
      display: none;
      margin-top: 20px;
    }

    .cert-result {
      display: none;
      margin-top: 20px;
      padding: 20px;
      border: 2px dashed #be2834;
      background: white;
      color: black;
    }

    /* FOOTER */
    .hbc-footer {
      margin-top: 50px;
      background: #be2834;
      padding: 20px;
      color: white;
    }

  </style>
</head>

<body>

<!-- HEADER / MENU (FULL COPIED STYLE) -->
<div class="banner-container">
  <img src="HARCCIAN (4).png">
</div>

<hr class="menu-divider">

<nav class="nav-container">

  <div class="dropdown">
    <a href="index.html" class="menu-button">HOME ▾</a>
    <div class="dropdown-content">
      <a href="mission.html">OUR MISSION</a>
      <a href="staff.html">STAFF</a>
      <a href="terms.html">TERMS</a>
    </div>
  </div>

  <a href="courses.html" class="menu-button">COURSES</a>
  <a href="certificates.html" class="menu-button">CERTIFICATES</a>

</nav>

<hr class="menu-divider">

<!-- CERT PAGE CONTENT -->
<div class="cert-box">

  <h1>Certificate Entry Test</h1>

  <p>Answer these questions to continue</p>

  <div class="quiz">
    <p>1. What is 1 + 1?</p>
    <input id="q1">

    <p>2. What color is red?</p>
    <input id="q2">

    <button onclick="checkQuiz()">Submit Answers</button>
  </div>

  <div id="formBox">
    <h2>Generate Certificate</h2>

    <input id="fullname" placeholder="Full Name">
    <input id="date" placeholder="Date">

    <button onclick="generateCert()">Generate</button>
  </div>

  <div class="cert-result" id="resultBox">
    <h2>HARCCIAN CERTIFICATE</h2>
    <p>This certifies</p>
    <h3 id="nameOut"></h3>
    <p id="dateOut"></p>
  </div>

</div>

<script>
function checkQuiz() {
  const a1 = document.getElementById("q1").value;
  const a2 = document.getElementById("q2").value.toLowerCase();

  if (a1 == "2" && a2.includes("red")) {
    document.getElementById("formBox").style.display = "block";
    alert("Great job — you passed!");
  } else {
    alert("Try again!");
  }
}

function generateCert() {
  document.getElementById("nameOut").innerText =
    document.getElementById("fullname").value;

  document.getElementById("dateOut").innerText =
    document.getElementById("date").value;

  document.getElementById("resultBox").style.display = "block";
}
</script>

<!-- FOOTER -->
<div class="hbc-footer">
  © 2026 HARCCIAN BIBLE COLLEGE™
</div>

</body>
</html>
