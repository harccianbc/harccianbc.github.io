 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Generation - HARCCIAN Bible College</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: 'Lato', Arial, sans-serif;
      background: #192535;
      color: #fff;
      text-align: center;
      padding: 40px;
      min-height: 100vh;
      user-select: none;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    .landing-logo {
      max-width: 240px;
      margin-bottom: 25px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      color: #ffd700;
      font-size: 28px;
      margin-bottom: 15px;
    }

    .instruction {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .warning {
      font-size: 12px;
      color: #ffd700;
      font-style: italic;
      margin-bottom: 20px;
    }

    /* 🔴 ACCESS CODE BOX */
    #accessCode {
      padding: 15px;
      font-size: 18px;
      width: 320px;
      max-width: 90%;
      border-radius: 6px;
      border: 3px solid red;
      background: white;
      color: black;
      font-weight: bold;
      text-align: center;
      margin-bottom: 10px;
      outline: none;
    }

    input[type="text"] {
      padding: 15px;
      font-size: 17px;
      width: 320px;
      max-width: 90%;
      border-radius: 6px;
      border: 2px solid #d4af37;
      margin-bottom: 10px;
      text-align: center;
    }

    button {
      padding: 14px 30px;
      font-size: 16px;
      margin-top: 10px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    .download-btn {
      background: #be2834;
      color: white;
      border: none;
    }

    .download-btn:hover {
      background: white;
      color: #be2834;
    }

    .home-btn {
      background: #d4af37;
      color: #192535;
      border: none;
    }

    .disclaimer {
      margin-top: 25px;
      font-size: 12px;
      color: #d4af37;
    }
  </style>
</head>

<body oncontextmenu="return false;">

<div class="container">

  <img src="certlogolion.png" class="landing-logo">

  <h1>Certificate of Completion - Ministry Program</h1>

  <div class="instruction">
    Enter your ACCESS CODE and FULL NAME to generate your certificate.
  </div>

  <div class="warning">
    ⚠ Access code is CASE SENSITIVE (example: Cgh657)
  </div>

  <!-- ACCESS CODE -->
  <input id="accessCode" type="password" placeholder="ENTER ACCESS CODE (e.g. Cgh657)">

  <!-- NAME -->
  <input id="studentName" type="text" placeholder="ENTER FULL NAME">

  <br>

  <button class="download-btn" onclick="generateCert()">Generate Certificate</button>

  <br>

  <button class="home-btn" onclick="goHome()">← Back to Home</button>

  <div class="disclaimer">
    H.B.C
  </div>

</div>

<script>
function generateCert() {

  const code = document.getElementById("accessCode").value.trim();
  const name = document.getElementById("studentName").value.trim();

  // CASE-SENSITIVE CHECK
  if (code !== "Cgh657") {
    alert("Incorrect access code. It is case sensitive.");
    return;
  }

  if (!name) {
    alert("Please enter your full name.");
    return;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('landscape', 'mm', 'a4');

  pdf.setFillColor(25, 37, 53);
  pdf.rect(0, 0, 297, 210, 'F');

  pdf.setDrawColor(212, 175, 55);
  pdf.setLineWidth(2.5);
  pdf.rect(10, 10, 277, 190);

  pdf.setLineWidth(0.8);
  pdf.rect(14, 14, 269, 182);

  try {
    pdf.addImage('certlogolion.png', 'PNG', 123, 22, 50, 45);
  } catch (e) {}

  pdf.setTextColor(255, 215, 0);
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(28);
  pdf.text('CERTIFICATE OF COMPLETION', 148.5, 82, { align: 'center' });

  pdf.setTextColor(255, 255, 255);
  pdf.setFontSize(18);
  pdf.text('This certifies that', 148.5, 100, { align: 'center' });

  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(32);
  pdf.text(name.toUpperCase(), 148.5, 120, { align: 'center' });

  pdf.setFont('helvetica', 'normal');
  pdf.setFontSize(15);
  pdf.text('has successfully completed the Ministry Program', 148.5, 138, { align: 'center' });

  pdf.setTextColor(255, 215, 0);
  pdf.setFontSize(18);
  pdf.text('Harccian Bible College™', 148.5, 150, { align: 'center' });

  pdf.setDrawColor(212, 175, 55);
  pdf.line(40, 180, 100, 180);

  pdf.setTextColor(255, 215, 0);
  pdf.setFontSize(16);
  pdf.text('Founder', 70, 175, { align: 'center' });

  pdf.setTextColor(255, 255, 255);
  pdf.setFontSize(10);
  pdf.text('College Founder', 70, 185, { align: 'center' });

  const today = new Date().toLocaleDateString('en-GB');
  pdf.text('Issued: ' + today, 227, 185, { align: 'center' });

  pdf.save(name + "_Certificate.pdf");
}

function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
