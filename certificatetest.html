
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#192535;
      color:#fff;
      text-align:center;
      padding:40px;
    }
    input, button{
      padding:12px;
      font-size:16px;
      margin:10px;
    }
    button{
      background:#be2834;
      color:#fff;
      border:none;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <h1>Certificate Test</h1>
  <input id="studentName" type="text" placeholder="Enter your name">
  <br>
  <button onclick="generateCert()">Download PDF Certificate</button>

  <script>
    function generateCert() {
      const name = document.getElementById('studentName').value || 'Student';
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('landscape', 'mm', 'a4');

      pdf.setFillColor(25, 37, 53);
      pdf.rect(0, 0, 297, 210, 'F');

      pdf.setDrawColor(212, 175, 55);
      pdf.setLineWidth(2);
      pdf.rect(10, 10, 277, 190);

      pdf.setTextColor(255, 215, 0);
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(28);
      pdf.text('CERTIFICATE OF COMPLETION', 148.5, 55, { align: 'center' });

      pdf.setTextColor(255, 255, 255);
      pdf.setFontSize(18);
      pdf.text('This certifies that', 148.5, 80, { align: 'center' });

      pdf.setFontSize(24);
      pdf.text(name, 148.5, 100, { align: 'center' });

      pdf.setFontSize(16);
      pdf.text('has successfully completed the test certificate page.', 148.5, 120, { align: 'center' });

      pdf.setFontSize(12);
      pdf.text('HARCCIAN Bible College', 148.5, 170, { align: 'center' });

      pdf.save('certificate.pdf');
    }
  </script>
</body>
</html>
