 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Test - HARCCIAN Bible College</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body {
      font-family: 'Lato', Arial, sans-serif;
      background: #192535;
      color: #fff;
      text-align: center;
      padding: 40px;
      min-height: 100vh;
    }
    h1 {
      font-family: 'Cinzel', serif;
      color: #ffd700;
      font-size: 36px;
      margin-bottom: 30px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    input {
      padding: 14px;
      font-size: 17px;
      width: 320px;
      max-width: 90%;
      border-radius: 5px;
      border: 2px solid #d4af37;
      background: #fff;
      color: #192535;
      margin-bottom: 20px;
    }
    button {
      padding: 14px 30px;
      font-size: 16px;
      margin: 10px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .download-btn {
      background: #be2834;
      color: white;
      border: none;
    }
    .download-btn:hover {
      background: #ffffff;
      color: #be2834;
    }
    .home-btn {
      background: #d4af37;
      color: #192535;
      border: none;
    }
    .home-btn:hover {
      background: #ffffff;
      color: #be2834;
    }
    .notice {
      margin-top: 40px;
      font-size: 14px;
      color: #d4af37;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Certificate Test</h1>
    
    <input id="studentName" type="text" placeholder="Enter your full name">
    <br><br>
    
    <button class="download-btn" onclick="generateCert()">Download PDF Certificate</button>
    
    <!-- Back to Home button - always visible -->
    <br><br>
    <button class="home-btn" onclick="goHome()">← Back to Home</button>

    <div class="notice">
      All certificates are for participation only.<br>
      Make sure the file <strong>h4logo.png</strong> is uploaded in the same folder.
    </div>
  </div>

  <script>
    function generateCert() {
      const name = document.getElementById('studentName').value.trim() || 'Student';

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('landscape', 'mm', 'a4');

      // Background
      pdf.setFillColor(25, 37, 53);
      pdf.rect(0, 0, 297, 210, 'F');

      // Gold border
      pdf.setDrawColor(212, 175, 55);
      pdf.setLineWidth(5);
      pdf.rect(10, 10, 277, 190);

      // Add Logo at the top
      try {
        pdf.addImage('h4logo.png', 'PNG', 118, 22, 60, 45);  // centered logo
      } catch(e) {
        console.log("Logo could not be loaded");
      }

      // Title
      pdf.setTextColor(255, 215, 0);
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(32);
      pdf.text('CERTIFICATE OF COMPLETION', 148.5, 85, { align: 'center' });

      // "This certifies that"
      pdf.setTextColor(255, 255, 255);
      pdf.setFontSize(18);
      pdf.text('This certifies that', 148.5, 105, { align: 'center' });

      // Student Name
      pdf.setFontSize(26);
      pdf.text(name.toUpperCase(), 148.5, 125, { align: 'center' });

      // Completion text
      pdf.setFontSize(16);
      pdf.text('has successfully completed the Certificate Test', 148.5, 145, { align: 'center' });

      // College name
      pdf.setFontSize(14);
      pdf.text('HARCCIAN Bible College™', 148.5, 170, { align: 'center' });

      // Date
      const today = new Date().toLocaleDateString('en-GB');
      pdf.setFontSize(12);
      pdf.text('Issued on: ' + today, 148.5, 185, { align: 'center' });

      // Save PDF
      pdf.save(name + '_HARCCIAN_Certificate.pdf');
    }

    function goHome() {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
