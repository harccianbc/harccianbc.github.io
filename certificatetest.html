 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Generation - HARCCIAN Bible College</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: 'Lato', Arial, sans-serif;
      background: #192535;
      color: #fff;
      text-align: center;
      padding: 40px;
      min-height: 100vh;
      user-select: none; 
    }

    .landing-logo {
      max-width: 240px;
      height: auto;
      margin-bottom: 25px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      color: #ffd700;
      font-size: 28px;
      line-height: 1.4;
      margin-bottom: 20px;
    }

    .instruction {
      font-size: 18px;
      color: #ffffff;
      margin-bottom: 5px;
    }

    .accreditation-notice {
      font-size: 11px;
      color: #ffd700; 
      margin-bottom: 25px;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    input {
      padding: 14px;
      font-size: 17px;
      width: 320px;
      max-width: 90%;
      border-radius: 5px;
      border: 2px solid #d4af37;
      background: #fff;
      color: #192535;
      margin-bottom: 10px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    button {
      padding: 14px 30px;
      font-size: 16px;
      margin: 10px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .download-btn {
      background: #be2834;
      color: white;
      border: none;
    }

    .download-btn:hover {
      background: #ffffff;
      color: #be2834;
    }

    .home-btn {
      background: #d4af37;
      color: #192535;
      border: none;
    }

    .disclaimer {
      margin-top: 30px;
      font-size: 13px;
      color: #d4af37;
    }
  </style>
</head>

<body oncontextmenu="return false;">

  <div class="container">

    <img src="certlogolion.png" class="landing-logo">

    <h1>Certificate of Completion - Ministry Program</h1>

    <div class="instruction">
      Enter your access code and full name to generate your certificate.
    </div>

    <div class="accreditation-notice">
      All certificates are non-accredited.
    </div>

    <!-- ACCESS CODE -->
    <input id="accessCode" type="password" placeholder="Enter access code">

    <!-- NAME -->
    <input id="studentName" type="text" placeholder="Enter your full name">

    <button class="download-btn" onclick="generateCert()">Generate Certificate</button>

    <br>

    <button class="home-btn" onclick="goHome()">← Back to Home</button>

    <div class="disclaimer">
      H.B.C
    </div>

  </div>

<script>
function generateCert() {

  const name = document.getElementById('studentName').value.trim();
  const code = document.getElementById('accessCode').value.trim();

  // ACCESS CODE CHECK
  if (code !== "CODE123") {
    alert("Invalid access code. Please complete your course and use the correct code.");
    return;
  }

  // NAME CHECK
  if (!name) {
    alert("Please enter your full name.");
    return;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('landscape', 'mm', 'a4');

  // Background
  pdf.setFillColor(25, 37, 53);
  pdf.rect(0, 0, 297, 210, 'F');

  // Border
  pdf.setDrawColor(212, 175, 55);
  pdf.setLineWidth(2.5);
  pdf.rect(10, 10, 277, 190);
  pdf.setLineWidth(0.8);
  pdf.rect(14, 14, 269, 182);

  // Logo
  try {
    pdf.addImage('certlogolion.png', 'PNG', 123.5, 22, 50, 45);
  } catch(e) {}

  // Title
  pdf.setTextColor(255, 215, 0);
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(28);
  pdf.text('CERTIFICATE OF COMPLETION', 148.5, 82, { align: 'center' });

  pdf.setTextColor(255, 255, 255);
  pdf.setFontSize(18);
  pdf.text('This certifies that', 148.5, 100, { align: 'center' });

  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(32);
  pdf.text(name.toUpperCase(), 148.5, 120, { align: 'center' });

  pdf.setFont('helvetica', 'normal');
  pdf.setFontSize(15);
  pdf.text('has successfully completed the Ministry Program', 148.5, 138, { align: 'center' });

  pdf.setFont('helvetica', 'bold');
  pdf.setTextColor(255, 215, 0);
  pdf.setFontSize(18);
  pdf.text('Harccian Bible College™', 148.5, 150, { align: 'center' });

  // Signature
  pdf.setDrawColor(212, 175, 55);
  pdf.line(40, 180, 100, 180);

  pdf.setTextColor(255, 215, 0);
  pdf.setFontSize(16);
  pdf.text('Founder', 70, 175, { align: 'center' });

  pdf.setTextColor(255, 255, 255);
  pdf.setFontSize(10);
  pdf.text('College Founder', 70, 185, { align: 'center' });

  // Date
  const today = new Date().toLocaleDateString('en-GB');
  pdf.text('Issued: ' + today, 227, 185, { align: 'center' });

  pdf.save(name + "_Certificate.pdf");
}

function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
